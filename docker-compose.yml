version: '3.8'

services:
  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: spapos
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mongodb://admin:password@mongodb:27017/spapos?authSource=admin
      - JWT_SECRET=supersecretjwtkey_for_docker
      - PORT=8000
    depends_on:
      - mongodb

  frontend:
    build: ./admin-panel
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
